# ============================================================
# Smart Resume Analyzer - Application Configuration
# ============================================================

# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# MySQL Database Configuration
# Make sure MySQL is running and create the database first:
# CREATE DATABASE resume_analyzer_db;
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/resume_analyzer_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Santosh@1

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
# update = creates tables if not exist, updates schema on changes
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true
# Format the SQL nicely in console
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# File Upload Configuration
# ============================================================
# Maximum file size for a single upload (5MB is good for resumes)
spring.servlet.multipart.max-file-size=5MB
# Maximum total request size
spring.servlet.multipart.max-request-size=5MB

# ============================================================
# File Storage Path
# Uploaded PDFs will be saved here (relative to project root)
# ============================================================
file.upload-dir=uploads

# ============================================================
# JWT Configuration
# IMPORTANT: Change the secret key before deploying to production!
# The secret must be at least 256 bits (32 characters) for HS256 algorithm
# ============================================================
jwt.secret=c21hcnRSZXN1bWVBbmFseXplclNlY3JldEtleTIwMjRGb3JKV1RUb2tlbkdlbmVyYXRpb25BbmRWYWxpZGF0aW9u
# Token expiry: 86400000 ms = 24 hours
jwt.expiration=86400000

# ============================================================
# Logging
# ============================================================
logging.level.com.resumeanalyzer=DEBUG
logging.level.org.springframework.security=INFO
